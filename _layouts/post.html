<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SimplifyOps</title>
    <meta name="description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --bg-2: #111111;
            --ink: #f2f1ee;
            --ink-soft: #d5d3cf;
            --ink-dim: #8a8680;
            --ink-dimmer: #55514c;
            --line: #1f1d1b;
            --accent: #c4724a;

            --display: 'Big Shoulders Display', 'Inter', sans-serif;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono: 'JetBrains Mono', ui-monospace, monospace;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--sans);
            color: var(--ink);
            background: var(--bg);
            line-height: 1.6;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        ::selection { background: var(--accent); color: var(--bg); }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .floaters {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floater {
            position: absolute;
            top: 0; left: 0;
            color: var(--ink-dimmer);
            will-change: transform;
        }
        .floater svg { display: block; }

        header, article, footer { position: relative; z-index: 1; }

        header {
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--line);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .header-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--display);
            font-weight: 900;
            font-size: 1.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--ink);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }

        nav a {
            font-family: var(--mono);
            color: var(--ink-dim);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: color 0.2s ease;
        }
        nav a:hover { color: var(--accent); }

        article {
            padding: 6rem 0 4rem;
        }

        .post-header {
            margin-bottom: 4rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--line);
        }

        .post-meta {
            font-family: var(--mono);
            color: var(--accent);
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }
        .post-meta::before {
            content: "";
            width: 24px;
            height: 1px;
            background: var(--accent);
        }

        .post-title {
            font-family: var(--display);
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.01em;
            line-height: 0.95;
            text-transform: uppercase;
            color: var(--ink);
        }

        .post-content {
            font-size: 1.0625rem;
            line-height: 1.8;
            color: var(--ink-soft);
        }

        .post-content > *:first-child { margin-top: 0; }

        .post-content h2 {
            font-family: var(--display);
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            text-transform: uppercase;
            margin-top: 3rem;
            margin-bottom: 1rem;
            color: var(--ink);
        }

        .post-content h3 {
            font-family: var(--display);
            font-size: 1.375rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            text-transform: uppercase;
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
            color: var(--ink);
        }

        .post-content p {
            margin-bottom: 1.5rem;
        }

        .post-content ul,
        .post-content ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        .post-content li::marker {
            color: var(--accent);
        }

        .post-content strong {
            color: var(--ink);
            font-weight: 600;
        }

        .post-content em { color: var(--ink); }

        .post-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
            transition: opacity 0.2s ease;
        }
        .post-content a:hover { opacity: 0.7; }

        .post-content blockquote {
            border-left: 2px solid var(--accent);
            padding-left: 1.5rem;
            margin: 2rem 0;
            color: var(--ink);
            font-family: var(--display);
            font-weight: 500;
            font-size: 1.375rem;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 0.01em;
        }

        .post-content hr {
            border: none;
            border-top: 1px solid var(--line);
            margin: 3rem 0;
        }

        .post-content code {
            font-family: var(--mono);
            font-size: 0.875em;
            background: var(--bg-2);
            color: var(--accent);
            padding: 0.15em 0.4em;
            border-radius: 2px;
        }

        .post-content pre {
            background: var(--bg-2);
            border: 1px solid var(--line);
            padding: 1.25rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }
        .post-content pre code {
            background: transparent;
            color: var(--ink-soft);
            padding: 0;
        }

        footer {
            padding: 2.5rem 0;
            border-top: 1px solid var(--line);
            margin-top: 4rem;
        }
        .footer-inner {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        footer p,
        footer a {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
        }
        footer p { color: var(--ink-dimmer); }
        footer a { color: var(--ink-dim); transition: color 0.2s ease; }
        footer a:hover { color: var(--accent); }

        @media (max-width: 600px) {
            article { padding: 4rem 0 2rem; }
            .post-content { font-size: 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .floater { display: none; }
            * { transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <div class="floaters" id="floaters" aria-hidden="true"></div>

    <svg style="display:none" aria-hidden="true">
        <defs>
            <symbol id="chip-wide" viewBox="0 0 60 36">
                <rect x="10" y="6" width="40" height="24" stroke="currentColor" stroke-width="0.7" fill="none"/>
                <circle cx="15" cy="11" r="0.9" fill="currentColor"/>
                <rect x="3" y="9" width="7" height="1.4" fill="currentColor"/>
                <rect x="3" y="14" width="7" height="1.4" fill="currentColor"/>
                <rect x="3" y="19" width="7" height="1.4" fill="currentColor"/>
                <rect x="3" y="24" width="7" height="1.4" fill="currentColor"/>
                <rect x="50" y="9" width="7" height="1.4" fill="currentColor"/>
                <rect x="50" y="14" width="7" height="1.4" fill="currentColor"/>
                <rect x="50" y="19" width="7" height="1.4" fill="currentColor"/>
                <rect x="50" y="24" width="7" height="1.4" fill="currentColor"/>
            </symbol>
            <symbol id="chip-square" viewBox="0 0 40 40">
                <rect x="4" y="4" width="32" height="32" stroke="currentColor" stroke-width="0.7" fill="none"/>
                <circle cx="9" cy="9" r="0.9" fill="currentColor"/>
                <rect x="0" y="11" width="4" height="1.2" fill="currentColor"/>
                <rect x="0" y="17" width="4" height="1.2" fill="currentColor"/>
                <rect x="0" y="23" width="4" height="1.2" fill="currentColor"/>
                <rect x="0" y="29" width="4" height="1.2" fill="currentColor"/>
                <rect x="36" y="11" width="4" height="1.2" fill="currentColor"/>
                <rect x="36" y="17" width="4" height="1.2" fill="currentColor"/>
                <rect x="36" y="23" width="4" height="1.2" fill="currentColor"/>
                <rect x="36" y="29" width="4" height="1.2" fill="currentColor"/>
            </symbol>
            <symbol id="dots" viewBox="0 0 30 18">
                <circle cx="3" cy="3" r="0.8" fill="currentColor"/>
                <circle cx="9" cy="3" r="0.8" fill="currentColor"/>
                <circle cx="15" cy="3" r="0.8" fill="currentColor"/>
                <circle cx="21" cy="3" r="0.8" fill="currentColor"/>
                <circle cx="27" cy="3" r="0.8" fill="currentColor"/>
                <circle cx="3" cy="9" r="0.8" fill="currentColor"/>
                <circle cx="9" cy="9" r="0.8" fill="currentColor"/>
                <circle cx="15" cy="9" r="0.8" fill="currentColor"/>
                <circle cx="21" cy="9" r="0.8" fill="currentColor"/>
                <circle cx="27" cy="9" r="0.8" fill="currentColor"/>
                <circle cx="3" cy="15" r="0.8" fill="currentColor"/>
                <circle cx="9" cy="15" r="0.8" fill="currentColor"/>
                <circle cx="15" cy="15" r="0.8" fill="currentColor"/>
                <circle cx="21" cy="15" r="0.8" fill="currentColor"/>
                <circle cx="27" cy="15" r="0.8" fill="currentColor"/>
            </symbol>
        </defs>
    </svg>

    <header>
        <div class="header-inner">
            <a href="/" class="logo">Simplify<span>Ops</span></a>
            <nav>
                <a href="/blog/">All posts</a>
            </nav>
        </div>
    </header>

    <article>
        <div class="container">
            <header class="post-header">
                <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
                <h1 class="post-title">{{ page.title }}</h1>
            </header>

            <div class="post-content">
                {{ content }}
            </div>
        </div>
    </article>

    <footer>
        <div class="footer-inner">
            <p>&copy; 2026 SimplifyOps</p>
            <a href="/#contact">Get in touch</a>
        </div>
    </footer>

    <script>
        const FLOATER_COUNT = 4;
        const SHAPES = ['chip-wide', 'chip-square', 'dots'];
        const SIZES = [
            { w: 60, h: 36 },
            { w: 44, h: 44 },
            { w: 34, h: 20 }
        ];

        const layer = document.getElementById('floaters');
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if (!reduced) {
            const floaters = [];
            for (let i = 0; i < FLOATER_COUNT; i++) {
                const idx = i % SHAPES.length;
                const shape = SHAPES[idx];
                const size = SIZES[idx];
                const scale = 0.8 + Math.random() * 1.0;

                const el = document.createElement('div');
                el.className = 'floater';
                el.innerHTML = `<svg width="${size.w * scale}" height="${size.h * scale}"><use href="#${shape}"/></svg>`;
                el.style.opacity = (0.1 + Math.random() * 0.15).toFixed(2);
                layer.appendChild(el);

                const speed = 0.05 + Math.random() * 0.12;
                const angle = Math.random() * Math.PI * 2;
                floaters.push({
                    el,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    dx: Math.cos(angle) * speed,
                    dy: Math.sin(angle) * speed,
                    rot: Math.random() * 360,
                    dRot: (Math.random() - 0.5) * 0.1,
                    w: size.w * scale,
                    h: size.h * scale
                });
            }

            let w = window.innerWidth, h = window.innerHeight;
            window.addEventListener('resize', () => { w = window.innerWidth; h = window.innerHeight; });

            function tick() {
                for (const f of floaters) {
                    f.x += f.dx;
                    f.y += f.dy;
                    f.rot += f.dRot;
                    if (f.x < -f.w - 20) f.x = w + 10;
                    if (f.x > w + 20) f.x = -f.w - 10;
                    if (f.y < -f.h - 20) f.y = h + 10;
                    if (f.y > h + 20) f.y = -f.h - 10;
                    f.el.style.transform = `translate3d(${f.x}px, ${f.y}px, 0) rotate(${f.rot}deg)`;
                }
                requestAnimationFrame(tick);
            }
            tick();
        }
    </script>
</body>
</html>
